                    }

                    if (destroyedPieces.length > 0) {
                        gameState.errorMessage += ` 巻き込まれた [ ${destroyedPieces.join(', ')} ] が粉砕されました！`;
                    }
                }
                else if (rand < 0.90) {
                    // 【新イベント】王と持ち駒以外、盤上のすべての通常駒が「歩」に強制変化する
                    gameState.errorMessage = `🌾 闇イベント発生！！！【歩兵の反乱】が勃発！盤上にある「王（玉）」以外のすべての駒が強制的に「歩」に変わってしまいました！`;
                    
                    for (let y = 0; y < 9; y++) {
                        for (let x = 0; x < 9; x++) {
                            const current = gameState.board[y][x];
                            // 空きマスではなく、王でもなく、巨大化パーツでもない通常の駒を変換
                            if (current.type !== PIECES.EMPTY && current.type !== PIECES.OU && !current.hugeOrigin) {
                                current.type = PIECES.FU;
                                current.promoted = false; // 成りも解除
                                current.huge = false;     // 巨大化も解除
                            }
                        }
                    }
                }
                else {
                    // 【新イベント】動かした駒が飛車と角を合わせた最強駒「天魔」に変貌する
                    if (targetPiece.type === PIECES.OU) {
                        gameState.errorMessage = `👑 究極の覚醒の兆しが見えましたが、王はすでに全知全能であるため変化しませんでした。`;
                        return;
                    }
                    gameState.board[toY][toX].type = PIECES.TENMA;
                    gameState.board[toY][toX].promoted = false; // 最初は「天」からスタート
                    gameState.errorMessage = `😈 闇イベント発生！！！究極融合の儀式により、${sideName}の「${pieceName}」が飛車と角の力を併せ持つ最強駒【天魔】に覚醒しました！`;
                }
            }
        }

        function finalizeTurn() {
            gameState.turn = (gameState.turn === 's') ? 'g' : 's';

            for (let y = 0; y < 9; y++) {
                for (let x = 0; x < 9; x++) {
                    const cell = gameState.board[y][x];
                    if (cell.player === gameState.turn) {
                        cell.invincible = false;

                        if (cell.huge) {
                            cell.huge = false;
                            
                            const targets = [
                                { x: x + 1, y: y },
                                { x: x,     y: y + 1 },
                                { x: x + 1, y: y + 1 }
                            ];
                            targets.forEach(t => {
                                if (t.x < 9 && t.y < 9) {
                                    gameState.board[t.y][t.x] = { type: PIECES.EMPTY, player: null, promoted: false, invincible: false, huge: false, hugeOrigin: null };
                                }
                            });
                        }
                    }
                }
            }

            recordPosition();
            if (checkSennichite()) {
                drawBoard();
                afterTurnHooks();
                return;
            }

            const inCheck = isKingInCheck(gameState.turn, gameState.board);
            const hasMoves = hasLegalMoves(gameState.turn);

            if (!hasMoves) {
                if (inCheck) {
                    gameState.gameOver = true;
                    gameState.winner = (gameState.turn === 's') ? 'g' : 's';
                } else {
                    gameState.gameOver = true;
                    gameState.winner = 'draw';
                    gameState.errorMessage = "合法手なし(不詰み引き分け)";
                }
            }
            drawBoard();
            afterTurnHooks();
        }

        function handleHandClick(player, pieceType) {
            if (gameState.gameOver) return;
            if (cpuThinking || (gameMode === 'cpu' && gameState.turn === cpuPlayer)) return;
            if (player !== gameState.turn) {
                gameState.errorMessage = "自分の持ち駒しか選択できません。";
                drawBoard();
                return;
            }
            gameState.errorMessage = "";
            gameState.selectedCell = null;
            
            const index = gameState.hands[player].indexOf(pieceType);
            gameState.selectedHandPiece = { player, type: pieceType, index };
            
            legalMovesCache = calculateHandLegalMoves(pieceType, player);
            drawBoard();
        }

        function handleCellClick(x, y) {
            if (gameState.gameOver) return;
            if (cpuThinking || (gameMode === 'cpu' && gameState.turn === cpuPlayer)) return;
            gameState.errorMessage = "";

            const clickedCell = gameState.board[y][x];

            let targetX = x;
            let targetY = y;
            if (clickedCell.hugeOrigin) {
                targetX = clickedCell.hugeOrigin.x;
                targetY = clickedCell.hugeOrigin.y;
            }

            if (gameState.selectedHandPiece) {
                if (gameState.board[targetY][targetX].player === gameState.turn) {
                    gameState.selectedHandPiece = null;
                    gameState.selectedCell = { x: targetX, y: targetY };
                    legalMovesCache = calculateCellLegalMoves(targetX, targetY);
                    drawBoard();
                    return;
                }
                dropPiece(x, y);
                return;
            }

            if (gameState.selectedCell) {
                if (gameState.board[targetY][targetX].player === gameState.turn) {
                    gameState.selectedCell = { x: targetX, y: targetY };
                    legalMovesCache = calculateCellLegalMoves(targetX, targetY);
                    drawBoard();
                    return;
                }
                movePiece(gameState.selectedCell.x, gameState.selectedCell.y, targetX, targetY);
            } 
            else {
                if (gameState.board[targetY][targetX].player === gameState.turn) {
                    gameState.selectedCell = { x: targetX, y: targetY };
                    legalMovesCache = calculateCellLegalMoves(targetX, targetY);
                    drawBoard();
                }
            }
        }

        document.getElementById('btn-promote-yes').addEventListener('click', () => promotePiece(true));
        document.getElementById('btn-promote-no').addEventListener('click', () => promotePiece(false));

        // ================================================================
        // ===================== CPU AI モジュール =====================
        // ================================================================
        const CPU_PIECE_VALUE = {
            [PIECES.OU]: 100000,
            [PIECES.TENMA]: 1500,
            [PIECES.HI]: 900,
            [PIECES.KA]: 800,
            [PIECES.KI]: 600,
            [PIECES.GI]: 500,
            [PIECES.KE]: 300,
            [PIECES.KY]: 300,
            [PIECES.FU]: 100
        };
        const CPU_PROMOTED_BONUS = 1.3; // 成駒は通常より高評価

        function cpuPieceScore(type, promoted) {
            const base = CPU_PIECE_VALUE[type] || 0;
            if (type === PIECES.OU) return base;
            return promoted ? Math.round(base * CPU_PROMOTED_BONUS) : base;
        }

        // 盤面評価（先手視点：プラスなら先手有利）
        function evaluateBoard(board, handsObj) {
            let score = 0;
            for (let y = 0; y < 9; y++) {
                for (let x = 0; x < 9; x++) {
                    const c = board[y][x];
                    if (c.type === PIECES.EMPTY) continue;
                    const v = cpuPieceScore(c.type, c.promoted);
                    score += (c.player === 's') ? v : -v;
                }
            }
            handsObj.s.forEach(t => { score += cpuPieceScore(t, false); });
            handsObj.g.forEach(t => { score -= cpuPieceScore(t, false); });
            return score;
        }

        // 指定局面(board/hands)における指定プレイヤーの全合法手を列挙。
        // 合法判定は既存の isValidMove / wouldBeInCheck / isValidDrop / wouldBeInCheckFromDrop / checkUchifuzume をそのまま利用する（新規の合法手ロジックは実装しない）。
        // 合法手が極端に多い局面（闇イベント等で持ち駒が大量になった場合）向けに、
        // 探索に使う候補手数を絞り込むヘルパー。捕獲手・盤上の移動を優先的に残し、
        // 残り枠は打ち手（drop）から盤全体をカバーするよう均等にサンプリングする。
        // ※ 合法手の判定自体は変えない。既存の合法手一覧から探索対象を間引くだけ。
        function limitMovesForSearch(moves, cap) {
            if (moves.length <= cap) return moves;

            const captures = moves.filter(m => m.isCapture);
            const boardMoves = moves.filter(m => !m.isCapture && m.kind === 'move');
            const drops = moves.filter(m => m.kind === 'drop');

            let result = captures.concat(boardMoves);
            if (result.length >= cap) return result.slice(0, cap);

            const remaining = cap - result.length;
            if (drops.length <= remaining) {
                return result.concat(drops);
            }
            const stride = drops.length / remaining;
            for (let i = 0; i < remaining; i++) {
                result.push(drops[Math.floor(i * stride)]);
            }
            return result;
        }

        function cpuGetAllLegalMoves(player, board, handsObj, dropSquareCap) {
            let moves = [];
            for (let y = 0; y < 9; y++) {
                for (let x = 0; x < 9; x++) {
                    const src = board[y][x];
                    if (src.player !== player) continue;
                    if (src.huge || src.hugeOrigin) continue;
                    for (let ty = 0; ty < 9; ty++) {
                        for (let tx = 0; tx < 9; tx++) {
                            if (board[ty][tx].player === player) continue;
                            if (isValidMove(x, y, tx, ty, src.type, player, board, src.promoted)) {
                                if (!wouldBeInCheck(x, y, tx, ty, player, board)) {
                                    const isCapture = board[ty][tx].type !== PIECES.EMPTY;
                                    moves.push({
                                        kind: 'move', fromX: x, fromY: y, toX: tx, toY: ty,
                                        pieceType: src.type, promoted: src.promoted, isCapture,
                                        capturedType: isCapture ? board[ty][tx].type : null
                                    });
                                }
                            }
                        }
                    }
                }
            }

            const handTypes = [...new Set(handsObj[player])];
            if (handTypes.length > 0) {
                let emptySquares = [];
                for (let y = 0; y < 9; y++) {
                    for (let x = 0; x < 9; x++) {
                        if (board[y][x].type === PIECES.EMPTY) emptySquares.push({ x, y });
                    }
                }

                // 打ち駒が大量にある局面（闇イベント等）で、駒の種類×空きマス数の掛け算が
                // 爆発しないよう、探索用途では候補マスを盤全体からサンプリングして間引く。
                // ※ 合法手判定（isValidDrop/wouldBeInCheckFromDrop/checkUchifuzume）自体は一切変更しない。
                if (dropSquareCap && emptySquares.length > dropSquareCap) {
                    const stride = emptySquares.length / dropSquareCap;
                    const sampled = [];
                    for (let i = 0; i < dropSquareCap; i++) {
                        sampled.push(emptySquares[Math.floor(i * stride)]);
                    }
                    emptySquares = sampled;
                }

                for (const pieceType of handTypes) {
                    for (const sq of emptySquares) {
                        const tx = sq.x, ty = sq.y;
                        if (isValidDrop(tx, ty, pieceType, player, false, board)) {
                            if (!wouldBeInCheckFromDrop(tx, ty, pieceType, player, board)) {
                                if (pieceType === PIECES.FU && checkUchifuzume(tx, ty, player, board, handsObj)) continue;
                                moves.push({ kind: 'drop', toX: tx, toY: ty, pieceType, player, isCapture: false });
                            }
                        }
                    }
                }
            }

            return moves;
        }

        // 成り判定（CPUは成れる場面では基本的に成りを選択する）
        function cpuShouldPromote(move, board) {
            if (move.kind !== 'move') return false;
            const src = board[move.fromY][move.fromX];
            if (src.promoted) return false;
            if (src.type === PIECES.KI || src.type === PIECES.OU) return false;

            const player = src.player;
            const isSenteZone = (move.toY <= 2 || move.fromY <= 2);
            const isGoteZone = (move.toY >= 6 || move.fromY >= 6);
            return (player === 's' && isSenteZone) || (player === 'g' && isGoteZone);
        }

        // 手を適用した仮想局面を生成（探索専用。gameStateやDOMには一切触れない純粋関数）
        function cpuApplyMove(board, handsObj, move) {
            const newBoard = cloneBoard(board);
            const newHands = { s: [...handsObj.s], g: [...handsObj.g] };

            if (move.kind === 'drop') {
                const idx = newHands[move.player].indexOf(move.pieceType);
                if (idx !== -1) newHands[move.player].splice(idx, 1);
                newBoard[move.toY][move.toX] = { type: move.pieceType, player: move.player, promoted: false, invincible: false, huge: false, hugeOrigin: null };
            } else {
                const source = newBoard[move.fromY][move.fromX];
                const target = newBoard[move.toY][move.toX];
                if (target.type !== PIECES.EMPTY && target.type !== PIECES.OU) {
                    newHands[source.player].push(target.type);
                }
                const promote = source.promoted || cpuShouldPromote(move, board);
                newBoard[move.toY][move.toX] = { type: source.type, player: source.player, promoted: promote, invincible: false, huge: false, hugeOrigin: null };
                newBoard[move.fromY][move.fromX] = { type: PIECES.EMPTY, player: null, promoted: false, invincible: false, huge: false, hugeOrigin: null };
            }
            return { board: newBoard, hands: newHands };
        }

        // ---- Lv1: 合法手からランダム（王手できる手があれば優先） ----
        function cpuChooseMoveLv1(player, board, handsObj) {
            let moves = cpuGetAllLegalMoves(player, board, handsObj, 40);
            if (moves.length === 0) return null;
            moves = limitMovesForSearch(moves, 120);

            const enemy = player === 's' ? 'g' : 's';
            const checkMoves = moves.filter(m => {
                const { board: nb } = cpuApplyMove(board, handsObj, m);
                return isKingInCheck(enemy, nb);
            });

            const pool = checkMoves.length > 0 ? checkMoves : moves;
            return pool[Math.floor(Math.random() * pool.length)];
        }

        // 「相手の次の一手で捕獲されうる最大の駒」だけを軽量に調べるための専用関数。
        // 打ち駒（drop）は空きマスにしか打てない＝絶対に捕獲手にならないため、
        // 盤上の駒の移動だけを見れば十分。持ち駒が大量にあっても影響を受けない。
        function cpuGetCaptureThreats(player, board) {
            let captures = [];
            for (let y = 0; y < 9; y++) {
                for (let x = 0; x < 9; x++) {
                    const src = board[y][x];
                    if (src.player !== player) continue;
                    if (src.huge || src.hugeOrigin) continue;
                    for (let ty = 0; ty < 9; ty++) {
                        for (let tx = 0; tx < 9; tx++) {
                            const target = board[ty][tx];
                            if (target.type === PIECES.EMPTY || target.player === player) continue;
                            if (isValidMove(x, y, tx, ty, src.type, player, board, src.promoted)) {
                                if (!wouldBeInCheck(x, y, tx, ty, player, board)) {
                                    captures.push({ toX: tx, toY: ty, capturedType: target.type });
                                }
                            }
                        }
                    }
                }
            }
            return captures;
        }

        // ---- Lv2: 駒得評価 + 1手読み（取れる駒は取る／王手優先／自玉の危険を回避） ----
        function cpuChooseMoveLv2(player, board, handsObj) {
            let moves = cpuGetAllLegalMoves(player, board, handsObj, 45);
            if (moves.length === 0) return null;
            moves = limitMovesForSearch(moves, 300);

            const enemy = player === 's' ? 'g' : 's';
            const perspective = (player === 's') ? 1 : -1;

            let bestScore = -Infinity;
            let bestMoves = [];

            moves.forEach(m => {
                const { board: nb, hands: nh } = cpuApplyMove(board, handsObj, m);
                let score = evaluateBoard(nb, nh) * perspective;

                if (isKingInCheck(enemy, nb)) score += 150;

                // 1手読み：この手を指した後、相手の最善の捕獲でどれだけ損するかを見て自玉/駒の危険を回避
                // （打ち駒は捕獲手になり得ないため、盤上の駒の移動だけを軽量にチェックする）
                const captureThreats = cpuGetCaptureThreats(enemy, nb);
                let worstLoss = 0;
                captureThreats.forEach(r => {
                    const capturedVal = cpuPieceScore(r.capturedType, nb[r.toY][r.toX].promoted);
                    if (capturedVal > worstLoss) worstLoss = capturedVal;
                });
                score -= worstLoss;

                if (score > bestScore) {
                    bestScore = score;
                    bestMoves = [m];
                } else if (score === bestScore) {
                    bestMoves.push(m);
                }
            });

            return bestMoves[Math.floor(Math.random() * bestMoves.length)];
        }

        // ---- Lv3: ミニマックス＋αβ探索（2手読み） ----
        const CPU_LV3_DEPTH = 2;
        const CPU_LV3_MOVE_CAP = 20; // 各局面で読む候補手数の上限（打ち駒が大量にある局面での爆発を防ぐ）

        function cpuMinimax(board, handsObj, depth, alpha, beta, sideToMove) {
            let moves = cpuGetAllLegalMoves(sideToMove, board, handsObj, 14);

            if (depth === 0 || moves.length === 0) {
                return evaluateBoard(board, handsObj);
            }

            moves.sort((a, b) => (b.isCapture ? 1 : 0) - (a.isCapture ? 1 : 0));
            moves = limitMovesForSearch(moves, CPU_LV3_MOVE_CAP);

            const enemy = sideToMove === 's' ? 'g' : 's';
            const maximizing = (sideToMove === 's');

            if (maximizing) {
                let value = -Infinity;
                for (const m of moves) {
                    const { board: nb, hands: nh } = cpuApplyMove(board, handsObj, m);
                    value = Math.max(value, cpuMinimax(nb, nh, depth - 1, alpha, beta, enemy));
                    alpha = Math.max(alpha, value);
                    if (alpha >= beta) break;
                }
                return value;
            } else {
                let value = Infinity;
                for (const m of moves) {
                    const { board: nb, hands: nh } = cpuApplyMove(board, handsObj, m);
                    value = Math.min(value, cpuMinimax(nb, nh, depth - 1, alpha, beta, enemy));
                    beta = Math.min(beta, value);
                    if (alpha >= beta) break;
                }
                return value;
            }
        }

        function cpuChooseMoveLv3(player, board, handsObj) {
            let moves = cpuGetAllLegalMoves(player, board, handsObj, 20);
            if (moves.length === 0) return null;

            moves.sort((a, b) => (b.isCapture ? 1 : 0) - (a.isCapture ? 1 : 0));
            moves = limitMovesForSearch(moves, CPU_LV3_MOVE_CAP * 2);

            const enemy = player === 's' ? 'g' : 's';
            const perspective = (player === 's') ? 1 : -1;

            let bestScore = -Infinity;
            let bestMoves = [];

            moves.forEach(m => {
                const { board: nb, hands: nh } = cpuApplyMove(board, handsObj, m);
                const raw = cpuMinimax(nb, nh, CPU_LV3_DEPTH - 1, -Infinity, Infinity, enemy);
                const score = raw * perspective;

                if (score > bestScore) {
                    bestScore = score;
                    bestMoves = [m];
                } else if (score === bestScore) {
                    bestMoves.push(m);
                }
            });

            return bestMoves[Math.floor(Math.random() * bestMoves.length)];
        }

        function cpuChooseMove(level, player, board, handsObj) {
            if (level === 1) return cpuChooseMoveLv1(player, board, handsObj);
            if (level === 2) return cpuChooseMoveLv2(player, board, handsObj);
            return cpuChooseMoveLv3(player, board, handsObj);
        }

        // 選ばれた手を実際のゲーム状態に反映する。既存のdropPiece/movePiece/promotePieceパイプラインをそのまま利用する。
        function cpuExecuteMove(move) {
            if (!move) return;

            if (move.kind === 'drop') {
                gameState.selectedHandPiece = { player: move.player, type: move.pieceType, index: gameState.hands[move.player].indexOf(move.pieceType) };
                gameState.selectedCell = null;
                dropPiece(move.toX, move.toY);
            } else {
                gameState.selectedCell = null;
                gameState.selectedHandPiece = null;
                movePiece(move.fromX, move.fromY, move.toX, move.toY);
                if (isPromotingState) {
                    const decision = cpuShouldPromote(move, gameState.board);
                    promotePiece(decision);
                }
            }
        }

        const CPU_THINK_TIME = { 1: 300, 2: 800, 3: 1500 };

        function runCpuTurn() {
            if (gameMode !== 'cpu') return;
            if (gameState.gameOver) return;
            if (gameState.turn !== cpuPlayer) return;
            if (cpuThinking) return;

            cpuThinking = true;
            document.getElementById('cpu-thinking').style.display = 'flex';

            const thinkTime = CPU_THINK_TIME[cpuLevel] || 500;

            setTimeout(() => {
                const move = cpuChooseMove(cpuLevel, cpuPlayer, gameState.board, gameState.hands);
                cpuExecuteMove(move);

                cpuThinking = false;
                document.getElementById('cpu-thinking').style.display = 'none';
            }, thinkTime);
        }

        // finalizeTurn後に呼ばれる共通フック：対局終了オーバーレイ表示 / CPU着手トリガー
        function afterTurnHooks() {
            if (gameState.gameOver) {
                showResultOverlay();
                return;
            }
            runCpuTurn();
        }

        // ================================================================
        // ===================== メニュー / UI モジュール =====================
        // ================================================================
        function showScreen(id) {
            ['menu-title', 'menu-level', 'menu-result'].forEach(sid => {
                document.getElementById(sid).style.display = (sid === id) ? 'flex' : 'none';
            });
        }

        function showTitleMenu() {
            document.getElementById('game-screen').style.display = 'none';
            showScreen('menu-title');
        }

        function showLevelMenu() {
            showScreen('menu-level');
        }

        function showResultOverlay() {
            const msg = document.getElementById('result-message');
            if (gameState.winner === 'draw') {
                msg.textContent = "引き分けです";
            } else {
                const winnerName = gameState.winner === 's' ? '先手（青）' : '後手（赤）';
                msg.textContent = `${winnerName}の勝ちです！`;
            }
            document.getElementById('menu-title').style.display = 'none';
            document.getElementById('menu-level').style.display = 'none';
            document.getElementById('menu-result').style.display = 'flex';
        }

        function resetGameState() {
            gameState.board = cloneBoard(initialBoard);
            gameState.hands = { s: [], g: [] };
            gameState.turn = 's';
            gameState.selectedCell = null;
            gameState.selectedHandPiece = null;
            gameState.lastMove = null;
            gameState.gameOver = false;
            gameState.winner = null;
            gameState.errorMessage = "";
            gameState.positionHistoryMap = new Map();
            gameState.moveHistory = [];
            checkingPieces = [];
            legalMovesCache = [];
            isPromotingState = false;
            pendingMove = null;
            cpuThinking = false;
            document.getElementById('cpu-thinking').style.display = 'none';
            document.getElementById('promote-ui').style.display = 'none';
        }

        function startGame(mode, level) {
            gameMode = mode;
            cpuLevel = level || 1;
            cpuPlayer = 'g'; // VS CPUでは常にプレイヤーが先手、CPUが後手を担当する

            resetGameState();
            recordPosition();

            document.getElementById('menu-title').style.display = 'none';
            document.getElementById('menu-level').style.display = 'none';
            document.getElementById('menu-result').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';

            drawBoard();
            runCpuTurn();
        }

        document.getElementById('btn-mode-pvp').addEventListener('click', () => startGame('pvp', null));
        document.getElementById('btn-mode-cpu').addEventListener('click', () => showLevelMenu());

        let selectedLevelForStart = 1;
        [1, 2, 3].forEach(lv => {
            document.getElementById(`btn-level-${lv}`).addEventListener('click', () => {
                selectedLevelForStart = lv;
                [1, 2, 3].forEach(l => document.getElementById(`btn-level-${l}`).classList.toggle('selected', l === lv));
            });
        });
        document.getElementById(`btn-level-${selectedLevelForStart}`).classList.add('selected');

        document.getElementById('btn-cpu-start').addEventListener('click', () => startGame('cpu', selectedLevelForStart));
        document.getElementById('btn-level-back').addEventListener('click', () => showScreen('menu-title'));
        document.getElementById('btn-play-again').addEventListener('click', () => startGame(gameMode, cpuLevel));
        document.getElementById('btn-back-title').addEventListener('click', () => showTitleMenu());

        // 初期表示はタイトルメニュー（対局はまだ開始しない）
        showTitleMenu();
    </script>
</body>
</html>
